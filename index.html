<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Cyber Jump</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .panel {
            background: rgba(10, 10, 20, 0.9); border: 2px solid #0ff;
            box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff;
            border-radius: 10px; padding: 40px; text-align: center;
            color: #fff; pointer-events: auto;
            display: none; backdrop-filter: blur(5px);
        }
        .panel.active { display: block; }
        h1 { margin: 0 0 20px 0; color: #f0f; text-shadow: 0 0 10px #f0f, 0 0 20px #f0f; font-size: 3rem; text-transform: uppercase; letter-spacing: 4px; }
        p { color: #0ff; font-size: 1.2rem; margin-bottom: 30px; text-shadow: 0 0 5px #0ff; }
        .chars { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .char-btn {
            background: #111; border: 2px solid #444; color: #aaa;
            padding: 10px 20px; font-size: 1rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }
        .char-btn.selected { border-color: #0ff; color: #0ff; box-shadow: 0 0 10px #0ff; }
        .btn {
            background: transparent; color: #f0f; border: 2px solid #f0f;
            padding: 15px 40px; font-size: 1.5rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-weight: bold; box-shadow: 0 0 10px #f0f inset;
        }
        .btn:hover { background: #f0f; color: #000; box-shadow: 0 0 20px #f0f, 0 0 20px #f0f inset; }
        #hud { position: absolute; top: 20px; right: 20px; font-size: 2rem; font-weight: bold; color: #0ff; text-shadow: 0 0 10px #0ff; display: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">0M</div>
    <div id="ui">
        <div id="startScreen" class="panel active">
            <h1>Neon Cyber Jump</h1>
            <p>Select your character</p>
            <div class="chars">
                <button class="char-btn selected" data-char="knight">Pixel Knight</button>
                <button class="char-btn" data-char="robot">Runner Robot</button>
            </div>
            <p>Space / Tap to Jump (Hold for higher)</p>
            <button class="btn" id="startBtn">Start Game</button>
        </div>
        <div id="gameOverScreen" class="panel">
            <h1>System Failure</h1>
            <p>Distance: <span id="finalScore">0</span>m<br>Best: <span id="bestScore">0</span>m</p>
            <button class="btn" id="restartBtn">Reboot</button>
        </div>
        <div id="pauseScreen" class="panel">
            <h1>Paused</h1>
            <p>System on Standby</p>
            <button class="btn" id="resumeBtn">Resume</button>
        </div>
        <button id="pauseBtn" style="position:absolute; top:20px; left:20px; font-size:1.2rem; padding:10px 20px; display:none; pointer-events:auto; background:transparent; color:#0ff; border:2px solid #0ff; cursor:pointer; font-weight:bold; text-shadow:0 0 5px #0ff; box-shadow:0 0 10px #0ff inset;">||</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const bestScoreEl = document.getElementById('bestScore');
        const charBtns = document.querySelectorAll('.char-btn');
        const pauseScreen = document.getElementById('pauseScreen');
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        
        let width, height;
        let bestScore = localStorage.getItem('cyberJumpBest') || 0;
        let selectedChar = 'knight';
        
        // Audio Context (initialized on user gesture)
        let audioCtx;
        let bgmOsc;
        let bgmGain;
        let audioEnabled = false;
        
        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            audioEnabled = true;
        }
        
        function playSound(type) {
            if (!audioEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'jump') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'death') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }
        
        function startBGM() {
            if (!audioEnabled || !audioCtx) return;
            stopBGM();
            bgmOsc = audioCtx.createOscillator();
            bgmGain = audioCtx.createGain();
            bgmOsc.type = 'triangle';
            bgmOsc.connect(bgmGain);
            bgmGain.connect(audioCtx.destination);
            bgmGain.gain.value = 0.05;
            
            const now = audioCtx.currentTime;
            bgmOsc.frequency.setValueAtTime(220, now);
            
            // simple pulsing bass
            setInterval(() => {
                if(!gameState.isPlaying || !bgmOsc) return;
                const time = audioCtx.currentTime;
                bgmOsc.frequency.setValueAtTime(220, time);
                bgmOsc.frequency.exponentialRampToValueAtTime(110, time + 0.2);
            }, 500);
            
            bgmOsc.start();
        }
        
        function stopBGM() {
            if (bgmOsc) {
                try { bgmOsc.stop(); } catch(e){}
                bgmOsc = null;
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game objects
        const gameState = {
            isPlaying: false,
            isPaused: false,
            speed: 5,
            baseSpeed: 5,
            score: 0,
            distance: 0,
            dayTime: 0, // 0 to 1
            gravity: 0.6
        };

        class Player {
            constructor() {
                this.x = 100;
                this.y = height / 2;
                this.w = 40;
                this.h = 40;
                this.vy = 0;
                this.isJumping = false;
                this.jumpTimer = 0;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                if (selectedChar === 'knight') {
                    // Draw a simple glowing pixel knight
                    ctx.fillStyle = '#0ff';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#0ff';
                    ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-this.w/2 + 25, -this.h/2 + 10, 10, 10); // eye
                } else {
                    // Draw robot
                    ctx.fillStyle = '#f0f';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#f0f';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.w/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(5, -10, 15, 8); // eye visor
                }
                
                ctx.restore();
            }
            update(keys) {
                // Hold to jump logic
                if (keys.jump && !this.isJumping) {
                    this.isJumping = true;
                    this.jumpTimer = 0;
                    this.vy = -10;
                    playSound('jump');
                    createParticles(this.x, this.y + this.h/2, '#fff', 10);
                }
                
                if (keys.jump && this.isJumping) {
                    this.jumpTimer++;
                    if (this.jumpTimer < 15) { // variable jump height
                        this.vy -= 0.6;
                    }
                }
                
                if (!keys.jump && this.isJumping) {
                    this.jumpTimer = 15; // cap jump if released
                }

                this.vy += gameState.gravity;
                this.y += this.vy;

                // Ground collision is handled by obstacles now
            }
        }

        class Obstacle {
            constructor(x, y, w, h, type) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.type = type; // 'platform', 'wall', 'hole'
                this.passed = false;
            }
            draw() {
                ctx.save();
                if (this.type === 'platform') {
                    ctx.fillStyle = '#111';
                    ctx.strokeStyle = '#0ff';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#0ff';
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                    ctx.strokeRect(this.x, this.y, this.w, this.h);
                } else if (this.type === 'wall') {
                    ctx.fillStyle = '#f0f';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#f0f';
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                }
                ctx.restore();
            }
            update() {
                this.x -= gameState.speed;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class Building {
            constructor(x, parallax) {
                this.x = x;
                this.w = Math.random() * 100 + 50;
                this.h = Math.random() * 300 + 100;
                this.parallax = parallax; // 0.1 to 0.5
                this.color = `hsl(${200 + Math.random()*40}, 50%, ${10 + Math.random()*10}%)`;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, height - this.h, this.w, this.h);
                // neon windows
                ctx.fillStyle = '#0ff';
                ctx.globalAlpha = 0.3;
                for(let i = 0; i < 5; i++) {
                    ctx.fillRect(this.x + 10 + Math.random()*(this.w-20), height - this.h + 20 + Math.random()*(this.h-40), 5, 5);
                }
                ctx.globalAlpha = 1.0;
            }
            update() {
                this.x -= gameState.speed * this.parallax;
            }
        }

        let player;
        let obstacles = [];
        let particles = [];
        let buildings = [];
        let groundLevel;
        let keys = { jump: false };
        let lastObstacleX = 0;

        function createParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // Input Handling
        const jumpAction = (val) => {
            keys.jump = val;
            if (val) initAudio();
        };

        window.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') jumpAction(true);
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') jumpAction(false);
        });
        window.addEventListener('touchstart', e => { jumpAction(true); });
        window.addEventListener('touchend', e => { jumpAction(false); });
        window.addEventListener('mousedown', e => { 
            if (e.target.tagName !== 'BUTTON') jumpAction(true); 
        });
        window.addEventListener('mouseup', e => { jumpAction(false); });

        // Character selection
        charBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                charBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedChar = btn.dataset.char;
            });
        });

        function togglePause() {
            if (!gameState.isPlaying || gameOverScreen.classList.contains('active')) return;
            gameState.isPaused = !gameState.isPaused;
            if (gameState.isPaused) {
                pauseScreen.classList.add('active');
                if(bgmGain && audioCtx) bgmGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
            } else {
                pauseScreen.classList.remove('active');
                if(bgmGain && audioCtx) bgmGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            }
        }

        pauseBtn.addEventListener('click', togglePause);
        resumeBtn.addEventListener('click', togglePause);
        window.addEventListener('keydown', e => {
            if (e.code === 'Escape') togglePause();
        });

        // Start/Restart
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        function startGame() {
            initAudio();
            startBGM();
            startScreen.classList.remove('active');
            gameOverScreen.classList.remove('active');
            pauseScreen.classList.remove('active');
            hud.style.display = 'block';
            pauseBtn.style.display = 'block';
            
            player = new Player();
            obstacles = [];
            particles = [];
            buildings = [];
            
            groundLevel = height - 100;
            gameState.isPlaying = true;
            gameState.isPaused = false;
            gameState.score = 0;
            gameState.distance = 0;
            gameState.speed = gameState.baseSpeed;
            gameState.dayTime = 0;
            
            // Initial ground
            obstacles.push(new Obstacle(0, groundLevel, width, height, 'platform'));
            lastObstacleX = width;

            // Generate buildings
            for(let i=0; i<width; i+=100) {
                buildings.push(new Building(i, 0.2));
                buildings.push(new Building(i+50, 0.4));
            }

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameState.isPlaying = false;
            pauseBtn.style.display = 'none';
            stopBGM();
            playSound('death');
            createParticles(player.x, player.y, '#f00', 50);
            
            // render final particles
            setTimeout(() => {
                hud.style.display = 'none';
                gameOverScreen.classList.add('active');
                finalScoreEl.innerText = Math.floor(gameState.distance);
                if (gameState.distance > bestScore) {
                    bestScore = gameState.distance;
                    localStorage.setItem('cyberJumpBest', bestScore);
                }
                bestScoreEl.innerText = Math.floor(bestScore);
            }, 1000);
        }

        function spawnObstacles() {
            if (obstacles.length > 0) {
                const last = obstacles[obstacles.length - 1];
                if (last.x + last.w < width + 200) {
                    // Decide what to spawn
                    const rand = Math.random();
                    const gap = Math.random() * 150 + 100 + (gameState.speed * 10);
                    
                    if (rand < 0.6) {
                        // Platform (ground)
                        const w = Math.random() * 400 + 200;
                        obstacles.push(new Obstacle(last.x + last.w + gap, groundLevel, w, 500, 'platform'));
                    } else if (rand < 0.8) {
                        // Wall on previous platform
                        const w = Math.random() * 400 + 200;
                        obstacles.push(new Obstacle(last.x + last.w, groundLevel, w, 500, 'platform'));
                        // Add wall
                        obstacles.push(new Obstacle(last.x + last.w + w/2, groundLevel - 60, 30, 60, 'wall'));
                    } else {
                        // Floating platform
                        const w = Math.random() * 200 + 100;
                        const y = groundLevel - (Math.random() * 100 + 50);
                        // base ground to prevent falling indefinitely right away, but with gap
                        obstacles.push(new Obstacle(last.x + last.w + gap, y, w, 20, 'platform'));
                        // still need ground eventually
                        obstacles.push(new Obstacle(last.x + last.w + gap + w + gap, groundLevel, 400, 500, 'platform'));
                    }
                }
            }
        }

        function checkCollisions() {
            let onGround = false;
            
            // Check falling out of bounds
            if (player.y > height + 100) {
                gameOver();
                return;
            }

            for (let obs of obstacles) {
                // AABB Collision
                if (player.x + player.w/2 > obs.x && 
                    player.x - player.w/2 < obs.x + obs.w &&
                    player.y + player.h/2 > obs.y && 
                    player.y - player.h/2 < obs.y + obs.h) {
                    
                    if (obs.type === 'wall') {
                        gameOver(); // Hit a wall directly
                        return;
                    }

                    // Platform collision
                    // Check if coming from above
                    if (player.vy >= 0 && player.y + player.h/2 - player.vy <= obs.y + 10) {
                        player.y = obs.y - player.h/2;
                        player.vy = 0;
                        player.isJumping = false;
                        onGround = true;
                    } else {
                        // Hit side or bottom of platform
                        gameOver();
                        return;
                    }
                }
            }
            
            // Freefall
            if (!onGround && !player.isJumping) {
                player.isJumping = true; 
            }
        }

        function update() {
            if (!gameState.isPlaying) {
                // update only particles during death
                for(let i=particles.length-1; i>=0; i--) {
                    particles[i].update();
                    if(particles[i].life <= 0) particles.splice(i, 1);
                }
                return;
            }

            // Difficulty increase
            gameState.distance += gameState.speed / 10;
            gameState.speed = gameState.baseSpeed + (gameState.distance * 0.002);
            hud.innerText = Math.floor(gameState.distance) + 'M';

            // Day/Night cycle
            gameState.dayTime += 0.0005;

            // Environment
            spawnObstacles();
            
            for(let b of buildings) {
                b.update();
                if(b.x + b.w < 0) {
                    b.x = width;
                    b.color = `hsl(${200 + Math.random()*40}, 50%, ${10 + Math.random()*10}%)`;
                }
            }

            for(let i=obstacles.length-1; i>=0; i--) {
                obstacles[i].update();
                if(obstacles[i].x + obstacles[i].w < -100) {
                    obstacles.splice(i, 1);
                }
            }

            // Player logic
            player.update(keys);
            checkCollisions();

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                particles[i].update();
                if(particles[i].life <= 0) particles.splice(i, 1);
            }
            
            // Trail particles
            if(Math.random() < 0.2) {
                createParticles(player.x - player.w/2, player.y, selectedChar==='knight'?'#0ff':'#f0f', 1);
            }
        }

        function draw() {
            // clear background
            // Day night cycle background
            let r = Math.floor(Math.sin(gameState.dayTime) * 20 + 10);
            let g = Math.floor(Math.sin(gameState.dayTime) * 10 + 5);
            let b = Math.floor(Math.sin(gameState.dayTime) * 30 + 20);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, width, height);

            // Add grid lines for cyberpunk feel
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            const gridOffset = (gameState.distance * 10) % 50;
            for(let i=0; i<width; i+=50) {
                ctx.moveTo(i - gridOffset, 0);
                ctx.lineTo(i - gridOffset, height);
            }
            ctx.stroke();

            // Buildings
            for(let b of buildings) b.draw();

            for(let obs of obstacles) obs.draw();
            for(let p of particles) p.draw();
            if (gameState.isPlaying) player.draw();
        }

        function gameLoop() {
            if (!gameState.isPaused) {
                update();
                draw();
            }
            if (gameState.isPlaying || particles.length > 0) {
                requestAnimationFrame(gameLoop);
            }
        }

        // initial draw
        draw();
    </script>
</body>
</html>
